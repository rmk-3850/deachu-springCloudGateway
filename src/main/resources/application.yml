server:
  port: '8080'
jwt:
  secret: ${secret}
spring:
  cloud:
    gateway:
      routes:
      - id: user-service
        uri: http://localhost:8081
        predicates:
        - Path=/api/user/**
        filters:
        - StripPrefix=2
        - JwtAuthenticationFilter

      - id: user-service
        uri: http://localhost:8081
        predicates:
        - Path=/api/auth/**
        filters:
        - StripPrefix=1

      - id: product-service
        uri: http://localhost:8082
        predicates:
        - Path=/api/product/**
        filters:
        - StripPrefix=2
        - JwtAuthenticationFilter